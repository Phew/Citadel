# cargo-deny configuration for Citadel CI (ADR-0002 §4 rev 2).
# Scope: advisories (RUSTSEC), license policy, multiple-versions hygiene,
# plus whole-graph bans for crates nothing in the workspace may ever link
# (graph-wide semantics are the desired behaviour there, not a bug).
# cargo-deny is NOT the mechanism for the service crypto-confinement rule
# (AGENTS.md rule 6): [[bans.deny]] wrappers are graph-wide and cannot
# express "no direct dependency from a service crate" — that rule is
# enforced by ci/check_crypto_confinement.py, whose blocklist is canonical.

[graph]
all-features = false
no-default-features = false

[advisories]
version = 2
yanked = "deny"
# First suppression block in this repo — format { id, reason } (cargo-deny
# 0.20). All eight arrive via the OpenMLS/hpke-rs libcrux chain (M2
# citadel-core) and every one is off Citadel's runtime crypto path; revisit
# this block when hpke-rs ships an optional-dep fix that drops the libcrux
# crates from the graph.
ignore = [
    # Ghost code, not compiled on any target — the RustCrypto aes-gcm /
    # chacha20poly1305 crates are the implementations actually built.
    { id = "RUSTSEC-2026-0209", reason = "libcrux aes-gcm ghost code, not compiled on any Citadel target; RustCrypto aes-gcm is the real implementation" },
    { id = "RUSTSEC-2026-0211", reason = "libcrux aes-gcm ghost code, not compiled on any Citadel target; RustCrypto aes-gcm is the real implementation" },
    { id = "RUSTSEC-2026-0210", reason = "libcrux-aesgcm ghost code, not compiled on any Citadel target; RustCrypto aes-gcm is the real implementation" },
    { id = "RUSTSEC-2026-0124", reason = "libcrux-chacha20poly1305 ghost code, not compiled on any Citadel target; RustCrypto chacha20poly1305 is the real implementation" },
    # Compiled, but Citadel's X25519/AES-128-GCM/SHA-256/Ed25519 suite never
    # invokes SHA-3/SHAKE.
    { id = "RUSTSEC-2026-0207", reason = "libcrux-sha3 compiled but unreachable: Citadel's cipher suite invokes no SHA-3/SHAKE" },
    { id = "RUSTSEC-2026-0208", reason = "libcrux-sha3 compiled but unreachable: Citadel's cipher suite invokes no SHA-3/SHAKE" },
    { id = "RUSTSEC-2026-0212", reason = "libcrux-secrets compiled but unreachable via any SHA-3/SHAKE call; Citadel's suite uses none" },
    # Build-time proc-macro only; no upstream fix available.
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 is build-time only (no runtime code path); no upstream fix exists" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    # webpki-roots (via reqwest/rustls in test-harness)
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Whole-graph bans (ADR-0002 §4 rev 2): crates NOTHING in the workspace may
# ever link, where graph-wide semantics are the point. TLS is rustls-only;
# the native-TLS/openssl stack must never enter the graph. The service
# crypto-confinement blocklist does NOT live here — see
# ci/check_crypto_confinement.py.
deny = [
    { name = "openssl-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
