name: ci

# Minutes discipline (charge, 2026-07-19): one run per push, not two.
# pull_request is the canonical CI trigger for agent branches — open a
# draft PR early to get CI; a branch push with no open PR runs nothing.
# push triggers only on main (post-merge verification). Docs-only changes
# skip the whole workflow: they cannot affect any job's verdict, and the
# canary-on-every-push M1 exit requirement concerns code reaching main,
# which still runs on every PR and every main push.
on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "plans/**", "**.md"]
  pull_request:
    branches: [main]
    paths-ignore: ["docs/**", "plans/**", "**.md"]

# Least privilege: every job only reads the repo.
permissions:
  contents: read

# Superseded runs on the same ref cancel; main never cancels so its signal
# stays complete. Keeps wall time inside the 15-minute budget (PLAN-KIMI-K3 DoD).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Toolchain comes ONLY from rust-toolchain.toml: MSRV/toolchain moves
      # happen by ADR (PLAN.md §13), never as a workflow side effect.
      # rustup resolves the toml (channel + components + profile) on the
      # first proxied command and auto-installs what is missing — no action
      # input that can drift from the toml. (dtolnay/rust-toolchain does NOT
      # read the toml; pinned with no toolchain input it failed every k3 job
      # at setup on 2026-07-17.)
      - name: Install toolchain (rust-toolchain.toml)
        run: rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo fmt
        run: cargo fmt --all -- --check

      # --locked: the committed Cargo.lock is the contract; a manifest that
      # would change it fails here instead of silently drifting.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

  audit:
    name: cargo-audit · cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Channel/components/profile come from rust-toolchain.toml (see rust job).
      - name: Install toolchain (rust-toolchain.toml)
        run: rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-audit
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-audit@0.22.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: cargo-deny@0.20.2

      # Verify the committed lockfile is in sync with the manifests, then
      # audit exactly what is committed (never a regenerated lockfile).
      - name: Lockfile is committed and current
        run: cargo fetch --locked

      # Service crypto confinement (AGENTS.md rule 6, ADR-0002 §4 rev 2):
      # the four service crates declare no direct crypto-primitive
      # dependency. cargo-deny cannot express this (graph-wide wrappers);
      # this manifest-scoped check is the canonical mechanism. Stdlib-only
      # Python; fails loudly if a service crate is missing, and its
      # self-test probe must fire or the job fails.
      - name: Crypto confinement check
        run: python3 ci/check_crypto_confinement.py

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

  compose-smoke:
    name: docker compose health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Channel/components/profile come from rust-toolchain.toml (see rust job).
      - name: Install toolchain (rust-toolchain.toml)
        run: rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build wait-healthy
        run: cargo build --locked -p test-harness --bin wait-healthy

      - name: Compose up
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for health endpoints
        run: ./target/debug/wait-healthy --timeout-secs 300

      # Stack-backed harness tests (#[ignore] by default; here the stack is
      # provisioned, so they MUST run — a green check means they did, §13).
      - name: Harness stack-backed tests
        run: cargo test --locked -p test-harness -- --include-ignored

      - name: Compose down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v

  # Database-backed tests against REAL PostgreSQL 16 (PLAN.md §13: CI
  # provisions the infrastructure; missing infra fails, never skips).
  # Runs the ignored DB tests: KeyPackage pool exactly-once property test,
  # M2 delivery store (idempotency/seq, participant authz, pagination,
  # welcome delivery).
  db-tests:
    name: database-backed tests (PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: citadel
          POSTGRES_PASSWORD: citadel
          POSTGRES_DB: citadel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U citadel -d citadel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgres://citadel:citadel@127.0.0.1:5432/citadel
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Channel/components/profile come from rust-toolchain.toml (see rust job).
      - name: Install toolchain (rust-toolchain.toml)
        run: rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # auth-service (M1 pool/KT) + delivery-service (M2 message path) db
      # tests share one database; both migrators run with ignore_missing.
      - name: Run DB-backed tests
        run: cargo test --locked -p auth-service -p delivery-service -- --include-ignored

  # M1 exit requirement (PLAN.md §13): harness injects canary plaintext
  # through client paths, then every server table and log stream is scanned
  # for it on every push. A clean verdict is only reported after the
  # scanner's control canary is detected, so green means the scan ran.
  canary-scan:
    name: no-plaintext canary scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: rust
    env:
      CITADEL_DATABASE_URL: postgres://citadel:citadel@127.0.0.1:5432/citadel
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Channel/components/profile come from rust-toolchain.toml (see rust job).
      - name: Install toolchain (rust-toolchain.toml)
        run: rustc --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build harness binaries
        run: cargo build --locked -p test-harness --bins

      - name: Compose up
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for health endpoints
        run: ./target/debug/wait-healthy --timeout-secs 300

      - name: Inject canaries through client paths
        run: ./target/debug/canary-scan inject --out canary-manifest.json

      - name: Capture all container logs
        run: docker compose -f deploy/docker-compose.yml logs --no-log-prefix > canary-logs.txt

      - name: Scan all server tables and logs for canaries
        run: ./target/debug/canary-scan verify --manifest canary-manifest.json --logs canary-logs.txt --report canary-report.json

      - name: Compose down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v

  # Path gate only — skips the heavy Node/Tauri job on Rust-only pushes.
  # pull-requests: read is required for dorny/paths-filter on pull_request
  # (lists changed files via the API; contents:read alone → "Resource not accessible").
  desktop-changes:
    name: desktop path filter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Path filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            desktop:
              - 'apps/desktop/**'

  desktop:
    name: desktop · pnpm · cargo test
    needs: desktop-changes
    if: needs.desktop-changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Tauri links WebKitGTK; unit tests still compile the native crate graph.
      - name: Install system deps (WebKitGTK)
        working-directory: ${{ github.workspace }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      # Channel/components/profile come from rust-toolchain.toml (see rust job).
      # rustup auto-installs on the first proxied command — no dtolnay action.
      - name: Install toolchain (rust-toolchain.toml)
        working-directory: ${{ github.workspace }}
        run: rustc --version

      - name: Cache cargo (src-tauri)
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

      - name: cargo test (src-tauri)
        working-directory: apps/desktop/src-tauri
        run: cargo test --locked
