# cargo-audit configuration.
#
# RUSTSEC-2023-0071 (rsa, Marvin timing sidechannel): rsa is in Cargo.lock
# only as an UNBUILT optional dependency of sqlx's mysql backend — the
# lockfile records every optional dependency, and no workspace manifest
# enables sqlx/mysql (verified via `cargo tree`; the resolve never compiles
# the mysql RSA auth path the attack needs). No fixed release exists.
# Revisit on any sqlx bump; enabling the mysql feature requires clearing
# this ignore first. (cargo-deny builds a feature-aware graph that excludes
# sqlx-mysql, so deny.toml needs no matching entry.)

[advisories]
ignore = [
    "RUSTSEC-2023-0071",
    # Revisit on any hpke-rs/OpenMLS backend or ciphersuite change.
    # Unbuilt libcrux AES-GCM/ChaCha20-Poly1305 backends pulled into the
    # lockfile by hpke-rs; Citadel builds the RustCrypto backends instead.
    "RUSTSEC-2026-0209",
    "RUSTSEC-2026-0211",
    "RUSTSEC-2026-0124",
    # Compiled libcrux SHA-3/SHAKE code is unreachable from Citadel's
    # X25519/AES-128-GCM/SHA-256/Ed25519 ciphersuite.
    "RUSTSEC-2026-0207",
    "RUSTSEC-2026-0208",
    "RUSTSEC-2026-0212",
]
